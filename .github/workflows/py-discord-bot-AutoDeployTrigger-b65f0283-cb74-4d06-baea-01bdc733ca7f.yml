name: Trigger auto deployment for py-discord-bot

on:
  push:
    branches: [ main ]
    paths:
    - '**' # This will trigger on any change in the repo, consider more specific paths if needed
    - '.github/workflows/py-discord-bot-AutoDeployTrigger-b65f0283-cb74-4d06-baea-01bdc733ca7f.yml'
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write
      contents: read

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.PYDISCORDBOT_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.PYDISCORDBOT_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.PYDISCORDBOT_AZURE_SUBSCRIPTION_ID }}

      - name: Build and deploy container image
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          dockerfilePath: ./bot.Dockerfile # Corrected
          # registryUrl:  # Leave blank for Azure to manage
          # registryUsername: ${{ secrets.PYDISCORDBOT_REGISTRY_USERNAME }} # Not needed if Azure manages registry
          # registryPassword: ${{ secrets.PYDISCORDBOT_REGISTRY_PASSWORD }} # Not needed if Azure manages registry
          containerAppName: py-discord-bot
          resourceGroup: PythonBotAppRG
          # imageToBuild: # Removed, let Azure handle image naming
