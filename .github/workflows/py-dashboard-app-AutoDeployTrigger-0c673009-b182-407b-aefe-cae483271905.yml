name: Trigger auto deployment for py-dashboard-app

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/py-dashboard-app-AutoDeployTrigger-0c673009-b182-407b-aefe-cae483271905.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.PYDASHBOARDAPP_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.PYDASHBOARDAPP_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.PYDASHBOARDAPP_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          dockerfilePath: dashboard/Dockerfile
          registryUrl:
          registryUsername: ${{ secrets.PYDASHBOARDAPP_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.PYDASHBOARDAPP_REGISTRY_PASSWORD }}
          containerAppName: py-dashboard-app
          resourceGroup: PythonBotAppRG


