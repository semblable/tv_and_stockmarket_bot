name: Trigger auto deployment for py-dashboard-app

on:
  push:
    branches: [ main ]
    paths:
    - '.github/workflows/py-dashboard-app-AutoDeployTrigger-0c673009-b182-407b-aefe-cae483271905.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # For OIDC
      contents: read # For checkout

    steps:
      - name: Confirm Workflow Version
        run: echo "MINIMAL WORKFLOW TEST V1 - YAML PARSE CHECK"

      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Debug Azure Credentials Secret
        run: |
          echo "Attempting to parse PYDASHBOARDAPP_AZURE_CREDENTIALS..."
          echo "Raw Secret Content (first 50 chars): ${{ toJSON(secrets.PYDASHBOARDAPP_AZURE_CREDENTIALS) }}"
          echo "Parsed clientId: ${{ fromJson(secrets.PYDASHBOARDAPP_AZURE_CREDENTIALS).clientId }}"
          echo "Parsed tenantId: ${{ fromJson(secrets.PYDASHBOARDAPP_AZURE_CREDENTIALS).tenantId }}"
          echo "Parsed subscriptionId: ${{ fromJson(secrets.PYDASHBOARDAPP_AZURE_CREDENTIALS).subscriptionId }}"
          # Do NOT echo clientSecret for security reasons

      - name: Azure Login
        uses: azure/login@v1
        with:
          auth-type: SERVICE_PRINCIPAL
          client-id: ${{ fromJson(secrets.PYDASHBOARDAPP_AZURE_CREDENTIALS).clientId }}
          tenant-id: ${{ fromJson(secrets.PYDASHBOARDAPP_AZURE_CREDENTIALS).tenantId }}
          subscription-id: ${{ fromJson(secrets.PYDASHBOARDAPP_AZURE_CREDENTIALS).subscriptionId }}
          client-secret: ${{ fromJson(secrets.PYDASHBOARDAPP_AZURE_CREDENTIALS).clientSecret }}

      # - name: Build and push container image to registry
      #   uses: azure/container-apps-deploy-action@v2
      #   with:
      #     appSourcePath: ${{ github.workspace }}
      #     dockerfilePath: dashboard/Dockerfile
      #     containerAppName: py-dashboard-app
      #     resourceGroup: PythonBotAppRG
      #     imageToBuild: py-dashboard-app:${{ github.sha }}
