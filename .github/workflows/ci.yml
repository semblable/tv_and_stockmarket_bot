name: CI

on:
  pull_request:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest pytest-asyncio ruff bandit

      - name: Lint (ruff — real errors only)
        # Scoped to ruff's canonical "find real bugs" set (syntax errors, undefined
        # names, invalid comparisons). Style rules are intentionally not gated yet.
        run: ruff check --select E9,F63,F7,F82 .

      - name: Run tests
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          pytest -q tests/

      - name: Security scan (bandit, medium+)
        # Skips classes triaged as false-positives / intended:
        #   B608 parameterized SQL (identifiers are code-controlled),
        #   B113 false positive (the flagged request passes timeout=),
        #   B104 Flask bind 0.0.0.0 (required for the uptime/webhook server),
        #   B314 stdlib XML parse of Google News RSS (HTTPS Google source).
        run: bandit -q -r . -x ./tests --severity-level medium --skip B101,B104,B113,B314,B608
